<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasko — Do what matters</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #f0f8ff;
    --surface2: #e0f2fe;
    --border: #bae6fd;
    --accent: #0ea5e9;
    --accent2: #7dd3fc;
    --accent3: #0284c7;
    --text: #0c2340;
    --muted: #4a7fa5;
    --done: #e0f2fe;
    --radius: 16px;
    --shadow: none;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 80px;
    background-image: none;
  }

  /* Header */
  header {
    width: 100%;
    max-width: 640px;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .header-tag {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-tag::before {
    content: '';
    display: inline-block;
    width: 24px;
    height: 2px;
    background: var(--accent2);
    border-radius: 2px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }

  h1 span {
    color: var(--accent);
    position: relative;
    display: inline-block;
  }

  h1 span::after {
    display: none;
  }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 1.05rem;
    font-weight: 500;
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 24px;
    margin-top: 28px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-val {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    transition: all 0.3s;
  }

  .stat-label {
    font-size: 0.82rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  .stat-val.accent { color: var(--accent); }
  .stat-val.teal  { color: var(--accent2); }
  .stat-val.red   { color: var(--accent3); }

  /* Input area */
  .input-card {
    width: 100%;
    max-width: 640px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 6px 6px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: none;
    margin-bottom: 16px;
    animation: fadeDown 0.7s ease both;
    transition: border-color 0.2s;
  }

  .input-card:focus-within {
    border-color: var(--accent);
    box-shadow: none;
  }

  .input-card input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1.08rem;
    font-weight: 500;
    padding: 10px 0;
  }

  .input-card input::placeholder { color: var(--muted); }

  .priority-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    padding: 6px 10px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .priority-select:focus { border-color: var(--accent); color: var(--text); }

  .add-btn {
    background: var(--accent);
    color: #0a1628;
    border: none;
    border-radius: 11px;
    padding: 10px 22px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, transform 0.15s;
    box-shadow: none;
  }

  .add-btn:hover { background: #7dd3fc; transform: translateY(-1px); }
  .add-btn:active { transform: translateY(1px); }

  /* Filters */
  .filters {
    width: 100%;
    max-width: 640px;
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    animation: fadeDown 0.8s ease both;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 100px;
    padding: 7px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a1628;
  }

  /* Todo list */
  .todo-list {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .todo-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 16px 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: none;
    animation: slideIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    transition: border-color 0.2s, opacity 0.3s, transform 0.3s;
    position: relative;
    overflow: hidden;
  }

  .todo-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .todo-item:hover { border-color: rgba(26,111,245,0.35); }
  .todo-item:hover::before { opacity: 1; }

  .todo-item.priority-high::before  { background: var(--accent3); opacity: 1; }
  .todo-item.priority-medium::before { background: var(--accent); opacity: 1; }
  .todo-item.priority-low::before  { background: var(--accent2); opacity: 1; }

  .todo-item.done {
    opacity: 0.45;
    background: var(--done);
    border-color: var(--done);
  }
  .todo-item.done::before { opacity: 0; }

  .todo-item.removing {
    transform: translateX(40px);
    opacity: 0;
    pointer-events: none;
  }

  /* Checkbox */
  .check-wrap {
    flex-shrink: 0;
    width: 22px; height: 22px;
    cursor: pointer;
  }

  .check-wrap input[type="checkbox"] { display: none; }

  .check-box {
    width: 22px; height: 22px;
    border-radius: 7px;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
  }

  .check-box:hover { border-color: var(--accent); }

  .check-box.checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-box svg { opacity: 0; transition: opacity 0.2s; }
  .check-box.checked svg { opacity: 1; }
  .check-box.checked svg path { stroke: #ffffff; }

  /* Todo text */
  .todo-content { flex: 1; min-width: 0; }

  .todo-text {
    font-size: 1.08rem;
    font-weight: 700;
    color: var(--text);
    transition: color 0.2s;
    word-break: break-word;
  }

  .todo-item.done .todo-text {
    color: var(--muted);
  }

  .todo-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 5px;
  }

  .priority-badge {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 8px;
    border-radius: 100px;
  }

  .badge-high   { background: rgba(14,165,233,0.12);  color: #0284c7; }
  .badge-medium { background: rgba(56,189,248,0.15);  color: #0ea5e9; }
  .badge-low    { background: rgba(125,211,252,0.2);  color: #0369a1; }

  .todo-time {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--muted);
  }

  /* Actions */
  .todo-actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .todo-item:hover .todo-actions { opacity: 1; }

  .icon-btn {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .icon-btn:hover { border-color: #0ea5e9; color: #0ea5e9; background: rgba(14,165,233,0.08); }
  .icon-btn.edit-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(56,189,248,0.1); }

  /* Edit input */
  .edit-input {
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1.08rem;
    font-weight: 700;
    padding: 5px 10px;
    outline: none;
    width: 100%;
  }

  /* Empty state */
  .empty-state {
    width: 100%;
    max-width: 640px;
    padding: 60px 20px;
    text-align: center;
    animation: fadeDown 0.5s ease both;
  }

  .empty-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-state p {
    color: var(--muted);
    font-size: 1.05rem;
    font-weight: 500;
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    max-width: 640px;
    margin-bottom: 28px;
    animation: fadeDown 0.75s ease both;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 10px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Responsive */
  @media (max-width: 480px) {
    .input-card { flex-wrap: wrap; padding: 12px; }
    .input-card input { width: 100%; }
    .priority-select, .add-btn { flex: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="header-tag">Your daily flow</div>
  <h1>Get things <span>done.</span></h1>
  <p class="subtitle">Focus on what matters, one task at a time.</p>
  <div class="stats">
    <div class="stat">
      <span class="stat-val accent" id="stat-total">0</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat">
      <span class="stat-val teal" id="stat-done">0</span>
      <span class="stat-label">Done</span>
    </div>
    <div class="stat">
      <span class="stat-val red" id="stat-pending">0</span>
      <span class="stat-label">Pending</span>
    </div>
  </div>
</header>

<div class="input-card">
  <input type="text" id="todo-input" placeholder="What needs to be done today?" maxlength="120" />
  <select class="priority-select" id="priority-select">
    <option value="medium">Medium</option>
    <option value="high">High</option>
    <option value="low">Low</option>
  </select>
  <button class="add-btn" id="add-btn">Add Task</button>
</div>

<div class="progress-wrap">
  <div class="progress-label">
    <span>Progress</span>
    <span id="progress-text">0 of 0 completed</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="active">Active</button>
  <button class="filter-btn" data-filter="done">Completed</button>
  <button class="filter-btn" data-filter="high">High</button>
  <button class="filter-btn" data-filter="medium">Medium</button>
  <button class="filter-btn" data-filter="low">Low</button>
</div>

<div class="todo-list" id="todo-list"></div>

<script>
  let todos = JSON.parse(localStorage.getItem('tasko-todos') || '[]');
  let filter = 'all';

  const listEl    = document.getElementById('todo-list');
  const inputEl   = document.getElementById('todo-input');
  const priorityEl = document.getElementById('priority-select');
  const addBtn    = document.getElementById('add-btn');

  function save() {
    localStorage.setItem('tasko-todos', JSON.stringify(todos));
  }

  function formatTime(ts) {
    const d = new Date(ts);
    const now = new Date();
    const diff = Math.floor((now - d) / 60000);
    if (diff < 1) return 'just now';
    if (diff < 60) return `${diff}m ago`;
    if (diff < 1440) return `${Math.floor(diff/60)}h ago`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function updateStats() {
    const total   = todos.length;
    const done    = todos.filter(t => t.done).length;
    const pending = total - done;

    document.getElementById('stat-total').textContent   = total;
    document.getElementById('stat-done').textContent    = done;
    document.getElementById('stat-pending').textContent = pending;

    const pct = total ? Math.round((done / total) * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = `${done} of ${total} completed`;
  }

  function getFiltered() {
    return todos.filter(t => {
      if (filter === 'all')    return true;
      if (filter === 'active') return !t.done;
      if (filter === 'done')   return t.done;
      return t.priority === filter;
    });
  }

  function render() {
    updateStats();
    const filtered = getFiltered();
    listEl.innerHTML = '';

    if (!filtered.length) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = `
        <div class="empty-icon">—</div>
        <p>${todos.length === 0 ? 'Add your first task above to get started.' : 'No tasks match this filter.'}</p>
      `;
      listEl.appendChild(empty);
      return;
    }

    filtered.forEach(todo => {
      const item = document.createElement('div');
      item.className = `todo-item priority-${todo.priority}${todo.done ? ' done' : ''}`;
      item.dataset.id = todo.id;

      item.innerHTML = `
        <div class="check-box${todo.done ? ' checked' : ''}" data-id="${todo.id}">
          <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
            <path d="M1 5l3.5 3.5L11 1" stroke="#0d0d12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="todo-content">
          <div class="todo-text" data-id="${todo.id}">${escHtml(todo.text)}</div>
          <div class="todo-meta">
            <span class="priority-badge badge-${todo.priority}">${todo.priority}</span>
            <span class="todo-time">${formatTime(todo.createdAt)}</span>
          </div>
        </div>
        <div class="todo-actions">
          <button class="icon-btn edit-btn" data-id="${todo.id}" title="Edit">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
          <button class="icon-btn delete-btn" data-id="${todo.id}" title="Delete">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
          </button>
        </div>
      `;

      listEl.appendChild(item);
    });

    // Event listeners
    listEl.querySelectorAll('.check-box').forEach(el => {
      el.addEventListener('click', () => toggleTodo(el.dataset.id));
    });

    listEl.querySelectorAll('.delete-btn').forEach(el => {
      el.addEventListener('click', () => deleteTodo(el.dataset.id));
    });

    listEl.querySelectorAll('.edit-btn').forEach(el => {
      el.addEventListener('click', () => editTodo(el.dataset.id));
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addTodo() {
    const text = inputEl.value.trim();
    if (!text) { inputEl.focus(); return; }

    todos.unshift({
      id: Date.now().toString(),
      text,
      priority: priorityEl.value,
      done: false,
      createdAt: Date.now()
    });

    inputEl.value = '';
    save();
    render();
    inputEl.focus();
  }

  function toggleTodo(id) {
    const t = todos.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTodo(id) {
    const el = listEl.querySelector(`[data-id="${id}"]`);
    if (el) {
      el.classList.add('removing');
      setTimeout(() => {
        todos = todos.filter(t => t.id !== id);
        save();
        render();
      }, 300);
    }
  }

  function editTodo(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;

    const textEl = listEl.querySelector(`.todo-text[data-id="${id}"]`);
    if (!textEl) return;

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'edit-input';
    input.value = todo.text;
    textEl.replaceWith(input);
    input.focus();
    input.select();

    const save_ = () => {
      const val = input.value.trim();
      if (val) { todo.text = val; save(); }
      render();
    };

    input.addEventListener('blur', save_);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') save_();
      if (e.key === 'Escape') render();
    });
  }

  // Filters
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    });
  });

  // Add
  addBtn.addEventListener('click', addTodo);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

  // Init
  render();
</script>
</body>
</html>
